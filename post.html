<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project View</title>
    <link rel="stylesheet" href="stylesheet.css"/>
    <style>
        .post-container { max-width: 800px; margin: 60px auto; padding: 0 20px; font-family: 'Roboto', sans-serif;}
        .post-header img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; }
        .post-content { line-height: 1.6; font-size: 1.1rem; }
        /* Style for images placed inside the text editor */
        .post-content img { max-width: 100%; height: auto; margin: 15px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="post-header">
            <h1 id="post-title">Loading...</h1>
            <p id="post-category" style="text-transform: uppercase; color: #296f86; font-weight: bold; margin: 10px 0;"></p>
            <img id="post-hero" src="" alt="" style="display: none;">
        </div>
        <div id="post-content" class="post-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const repoOwner = 'libertyjensenart'; // ⚠️ Change this
        const repoName = 'libertyjensenart.github.io';       // ⚠️ Change this

        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectSlug = urlParams.get('project');

            if (!projectSlug) {
                document.getElementById('post-title').innerText = "Project not found";
                return;
            }

            try {
                const response = await fetch(`https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/_portfolio/${projectSlug}.json`);
                const project = await response.json();

                document.title = project.title;
                document.getElementById('post-title').innerText = project.title;
                document.getElementById('post-category').innerText = project.category;
                
                if(project.thumbnail) {
                    const hero = document.getElementById('post-hero');
                    hero.src = project.thumbnail;
                    hero.style.display = 'block';
                }

                // Decap CMS body uses Markdown. We use 'marked' script loaded above to convert it to HTML seamlessly.
                document.getElementById('post-content').innerHTML = marked.parse(project.body);

            } catch (err) {
                console.error(err);
                document.getElementById('post-title').innerText = "Error loading project data.";
            }
        }
        loadPost();
    </script>
</body>
</html>
